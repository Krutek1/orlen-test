name: Update Orlen Paczka points

on:
  schedule:
    # 07:00 UTC = 08:00 zimą / 09:00 latem w Polsce
    # Orlen aktualizuje bazę po 6:00, więc jesteśmy po fakcie.
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install zeep

      - name: Fetch Orlen points
        env:
          ORLEN_PARTNER_ID: ${{ secrets.ORLEN_PARTNER_ID }}
          ORLEN_PARTNER_KEY: ${{ secrets.ORLEN_PARTNER_KEY }}
        run: python fetch_orlen_points.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add points.json
          if git diff --cached --quiet; then
            echo "No changes in points.json"
          else
            git commit -m "chore: update Orlen points $(date -u +%Y-%m-%d)"
            git push
          fi
